  * { box-sizing: border-box; }
  input[type=text] { font-family: inherit; }
  
  /* Smooth animations */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-15px); max-height: 0; }
    to { opacity: 1; transform: translateY(0); max-height: 5000px; }
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

    animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;

function Logo({ size = 46, chip = false }) {

  const content = !err
    ? <img src={LOGO_SRC} alt="Yakima School District" onError={() => setErr(true)} style={{ height: size, width: "auto", display: "block" }} />

        <div style={{ fontFamily: '"Segoe Script","Brush Script MT","Snell Roundhand",cursive', fontStyle: "italic", fontSize: size * 0.62, color: "#ffffff", fontWeight: 700, textShadow: "0 2px 4px rgba(0,0,0,0.3)" }}>Yakima</div>

/* ===== Flatten for search ===== */
function flatten(node, chartId, acc) {
  if (node.name) acc.push({ name: node.name, title: node.title || "", sub: node.sub || "", chart: chartId });
  if (node.person) acc.push({ name: node.person, title: node.label || "", sub: "", chart: chartId });
  (node.children || []).forEach((c) => flatten(c, chartId, acc));
}
const allPeople = [];
order.forEach((id) => {
  const c = charts[id];
  if (c.root) flatten(c.root, id, allPeople);
  if (c.exec) allPeople.push({ name: c.exec.name, title: c.exec.title, sub: "", chart: id });
  (c.members || []).forEach((m) => allPeople.push({ name: m.name, title: m.title, sub: m.sub || "", chart: id }));
});

/* ===== Connector lines ===== */
function VLine({ h }) { return <div style={{ width: 2, height: h, background: "rgba(255,255,255,0.2)", borderRadius: 1 }} />; }
function HLine({ w }) { return <div style={{ width: w, height: 2, background: "rgba(255,255,255,0.2)", borderRadius: 1 }} />; }

/* ===== Recursive Node with Expand State ===== */
function TreeNode({ node, depth = 0, onExpandChart, expandedNodes, toggleNode }) {
  const nodeId = `${depth}-${node.name || node.label || Math.random()}`;
  const isExpanded = expandedNodes.has(nodeId);
  const hasChildren = (node.children && node.children.length > 0) || node.dept || node.schools;
  const isClickable = !!node.chart;
  const isDept = node.dept || node.schools;

  const handleExpand = (e) => {
    e.stopPropagation();
    if (isClickable) {
      onExpandChart(node.chart);
    } else if (hasChildren) {
      toggleNode(nodeId);
    }
  };

  const cardStyle = {
    background: isClickable 
      ? "linear-gradient(135deg, rgba(255,200,150,0.15) 0%, rgba(255,150,150,0.15) 100%)"
      : "rgba(255,255,255,0.08)",
    backdropFilter: "blur(10px)",
    border: isClickable 
      ? "2px solid rgba(255,200,150,0.4)" 
      : isExpanded 
        ? "2px solid rgba(100,200,255,0.5)" 
        : "2px solid rgba(255,255,255,0.15)",
    borderRadius: 12,
    padding: "14px 18px",
    minWidth: 200,
    maxWidth: 280,
    cursor: hasChildren ? "pointer" : "default",
    position: "relative",
    boxShadow: isExpanded 
      ? "0 8px 30px rgba(100,200,255,0.2)" 
      : "0 4px 15px rgba(0,0,0,0.2)",
    transition: "all 0.25s cubic-bezier(0.4, 0, 0.2, 1)",
  };

  const expandIndicator = hasChildren && (
    <div style={{ 
      position: "absolute", 
      right: 10, 
      top: "50%", 
      transform: "translateY(-50%)",
      width: 28, 
      height: 28, 
      background: isExpanded 
        ? "linear-gradient(135deg, #64c8ff 0%, #4fa8d4 100%)"
        : "linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.1) 100%)",
      borderRadius: "50%",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      transition: "all 0.25s cubic-bezier(0.4, 0, 0.2, 1)",
      boxShadow: isExpanded ? "0 4px 12px rgba(100,200,255,0.4)" : "none"
    }}>
      <div style={{ 
        width: 10, 
        height: 10, 
        borderTop: "2.5px solid white", 
        borderRight: "2.5px solid white",
        transform: isExpanded ? "rotate(-135deg)" : "rotate(45deg)",
        transition: "transform 0.25s cubic-bezier(0.4, 0, 0.2, 1)"
      }} />
    </div>
  );

  if (isDept) {
    return (
      <div style={{ display: "inline-block", textAlign: node.schools ? "left" : "center" }} className="fade-in">
        <div style={{
          ...cardStyle,
          background: node.schools 
            ? "linear-gradient(135deg, rgba(150,255,200,0.15) 0%, rgba(100,255,180,0.15) 100%)"
            : "rgba(255,255,255,0.05)",
          border: node.schools 
            ? "2px solid rgba(150,255,200,0.4)" 
            : "2px dashed rgba(255,255,255,0.2)",
          fontSize: node.schools ? 12 : 13,
          fontWeight: 600,
          color: node.schools ? "#a8ffda" : "#ccc",
        }}>
          {node.label}
        </div>
        {node.person && (
          <div style={{ 
            background: "rgba(255,255,255,0.1)", 
            border: "2px solid rgba(255,200,150,0.4)", 
            borderRadius: 8, 
            padding: "5px 12px", 
            margin: "-3px auto 0", 
            maxWidth: 180, 
            fontSize: 11, 
            fontWeight: 600, 
            color: "#ffc896", 
            textAlign: "center",
            boxShadow: "0 2px 10px rgba(255,200,150,0.15)"
          }}>
            {node.person}
          </div>
        )}
      </div>
    );
  }

  return (
    <div 
      className="node-card scale-in"
      onClick={handleExpand}
      style={cardStyle}
    >
      {expandIndicator}
      <div style={{ fontSize: 14, fontWeight: 700, color: "#fff", marginBottom: 5 }}>{node.name}</div>
      {node.title && <div style={{ fontSize: 12, color: "rgba(255,255,255,0.85)", fontWeight: 500 }}>{node.title}</div>}
      {node.sub && <div style={{ fontSize: 11, fontStyle: "italic", color: "rgba(255,255,255,0.7)", marginTop: 3 }}>{node.sub}</div>}
      {node.phone && <div style={{ fontSize: 11, color: "rgba(255,255,255,0.75)", marginTop: 4 }}>{node.phone}</div>}
      {node.email && <div style={{ fontSize: 11, color: "#64c8ff", wordBreak: "break-all", marginTop: 2 }}>{node.email}</div>}
      
      {hasChildren && !isExpanded && (
        <div style={{ 
          fontSize: 10, 
          color: "#64c8ff", 
          marginTop: 8, 
          fontWeight: 600,
          textTransform: "uppercase",
          letterSpacing: 1
        }}>
          {node.children.length} child(ren) ↓ Click to expand
        </div>
      )}
      
      {hasChildren && isExpanded && (
        <div style={{ 
          fontSize: 10, 
          color: "#a8ffda", 
          marginTop: 8, 
          fontWeight: 600,
          textTransform: "uppercase",
          letterSpacing: 1
        }}>
          Expanded ↑ Click to collapse
        </div>
      )}
    </div>
  );
}

/* ===== Recursive Children Renderer ===== */
function ChildrenRenderer({ items, depth, onExpandChart, expandedNodes, toggleNode }) {
  if (!items || items.length === 0) return null;
  
  return (
    <div style={{ 
      display: "flex", 
      flexDirection: "column", 
      alignItems: "center", 
      marginTop: 12,
      paddingLeft: depth > 0 ? 30 : 0
    }}>
      <VLine h={16} />
      <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 16 }}>
        {items.map((item, i) => (
          <div key={i} className="expand-children" style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
            {i > 0 && depth > 0 && (
              <div style={{ 
                position: "absolute", 
                left: -20, 
                top: 8, 
                width: 20, 
                height: 2, 
                background: "rgba(255,255,255,0.2)",
                borderRadius: 1
              }} />
            )}
            <TreeNode 
              node={item} 
              depth={depth + 1} 
              onExpandChart={onExpandChart}
              expandedNodes={expandedNodes}
              toggleNode={toggleNode}
            />
            {item.children && item.children.length > 0 && (
              <ChildrenRenderer 
                items={item.children} 
                depth={depth + 1} 
                onExpandChart={onExpandChart}
                expandedNodes={expandedNodes}
                toggleNode={toggleNode}
              />
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

        {a.email && <div style={{ fontSize: 10, color: "#64c8ff", wordBreak: "break-all", marginTop: 2 }}>{a.email}</div>}

    </div>
  );
}

/* ===== Tree Chart with Expandable Nodes ===== */
function TreeChart({ chart, onExpandChart, expandedNodes, toggleNode }) {
  const r = chart.root;
  const kids = r.children || [];
  
  return (
    <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ position: "relative", marginBottom: 12 }}>
        {r.assistant && <AssistantBox a={r.assistant} />}
        <div style={{ 
          background: "linear-gradient(135deg, #ffc896 0%, #ff9696 100%)", 
          borderRadius: 16, 
          padding: "18px 28px", 
          textAlign: "center", 
          minWidth: 240,
          boxShadow: "0 8px 35px rgba(255,200,150,0.3)",
          animation: "scaleIn 0.4s ease-out",
          border: "3px solid rgba(255,255,255,0.2)"
        }}>
          <div style={{ fontSize: 16, fontWeight: 700, color: "#1a1a2e", marginBottom: 5 }}>{r.name}</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: "rgba(26,26,46,0.85)" }}>{r.title}</div>
          {r.phone && <div style={{ fontSize: 12, color: "rgba(26,26,46,0.75)", marginTop: 5 }}>{r.phone}</div>}
          {r.email && <div style={{ fontSize: 12, color: "rgba(26,26,46,0.8)", marginTop: 3 }}>{r.email}</div>}
        </div>
      </div>
      {kids.length > 0 && (
        <ChildrenRenderer 
          items={kids} 
          depth={0} 
          onExpandChart={onExpandChart}

}

/* ===== Home Page ===== */
function Home({ onExpandChart }) {
  const [search, setSearch] = useState("");
  const [expandedNodes, setExpandedNodes] = useState(new Set());
  const results = search.length > 1 ? allPeople.filter((p) => (p.name + p.title + p.sub).toLowerCase().includes(search.toLowerCase())) : [];

  const toggleNode = useCallback((nodeId) => {
    setExpandedNodes(prev => {
      const newSet = new Set(prev);
      if (newSet.has(nodeId)) {
        newSet.delete(nodeId);
      } else {
        newSet.add(nodeId);
      }
      return newSet;
    });
  }, []);

  const collapseAll = useCallback(() => {
    setExpandedNodes(new Set());
  }, []);

  const handleChartExpand = useCallback((chartId) => {
    onExpandChart(chartId);
  }, [onExpandChart]);

  return (
    <div style={{ 
      padding: "32px 28px 60px", 
      maxWidth: 1400, 
      margin: "0 auto",
      animation: "fadeIn 0.5s ease-out"
    }}>
      <div style={{ 
        display: "flex", 
        alignItems: "center", 
        justifyContent: "space-between",
        flexWrap: "wrap",
        gap: 16,
        marginBottom: 16,
        background: "rgba(255,255,255,0.08)",
        backdropFilter: "blur(15px)",
        padding: "24px 32px",
        borderRadius: 18,
        boxShadow: "0 8px 30px rgba(0,0,0,0.3)",
        border: "2px solid rgba(255,255,255,0.1)"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 18, flexWrap: "wrap" }}>
          <Logo size={64} chip />
          <div>
            <h1 style={{ fontSize: 32, fontWeight: 700, margin: 0, color: "#fff", textShadow: "0 3px 8px rgba(0,0,0,0.3)" }}>
              Organizational Chart
            </h1>
            <div style={{ fontSize: 14, color: "rgba(255,255,255,0.75)", marginTop: 5 }}>
              Click any card to expand its hierarchy • Click again to collapse • All cards stay visible
            </div>
          </div>
        </div>
        <button 
          onClick={collapseAll}
          className="collapse-all-btn"
        >
          Collapse All ↑
        </button>
      </div>

      <input 
        type="text" 
        value={search} 
        onChange={(e) => setSearch(e.target.value)} 
        placeholder="🔍 Search people by name, title, or department..."
        style={{ 
          width: "100%", 
          fontSize: 16, 
          padding: "16px 20px", 
          borderRadius: 14, 
          border: "2px solid rgba(255,255,255,0.2)", 
          background: "rgba(255,255,255,0.08)",
          backdropFilter: "blur(10px)",
          color: "#fff",
          margin: "20px 0 14px",
          boxShadow: "0 4px 15px rgba(0,0,0,0.2)",
          outline: "none",
          placeholder: "rgba(255,255,255,0.5)"
        }} 
      />

      {search.length > 1 && (
        <div style={{ 
          background: "rgba(255,255,255,0.08)", 
          backdropFilter: "blur(10px)",
          borderRadius: 14, 
          border: "2px solid rgba(255,255,255,0.15)", 
          padding: 16, 
          marginBottom: 24,
          boxShadow: "0 4px 20px rgba(0,0,0,0.2)"
        }}>
          {results.length === 0 && <div style={{ fontSize: 15, color: "rgba(255,255,255,0.6)" }}>No matches found.</div>}
          {results.map((p, i) => (
            <div 
              key={i} 
              onClick={() => handleChartExpand(p.chart)}
              className="fade-in"
              style={{ 
                display: "flex", 
                justifyContent: "space-between", 
                padding: "12px 16px", 
                cursor: "pointer", 
                fontSize: 15, 
                borderBottom: i < results.length - 1 ? "1px solid rgba(255,255,255,0.1)" : "none",
                borderRadius: 10,
                transition: "all 0.2s ease"
              }}
              onMouseEnter={(e) => e.currentTarget.style.background = "rgba(100,200,255,0.15)"}
              onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
            >
              <span><b style={{ color: "#fff" }}>{p.name}</b> <span style={{ color: "rgba(255,255,255,0.7)" }}>— {p.title}</span>{p.sub ? <span style={{ color: "rgba(255,255,255,0.6)", fontStyle: "italic" }}> ({p.sub})</span> : ""}</span>
              <span style={{ color: "#64c8ff", fontSize: 14, fontWeight: 600 }}>{charts[p.chart].label.split(",")[0]} →</span>
            </div>
          ))}
        </div>
      )}

      <div style={{ 
        display: "grid", 
        gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", 
        gap: 24, 
        marginTop: 24 
      }}>
        {order.map((id) => (
          <div 
            key={id} 
            onClick={() => handleChartExpand(id)}
            className="node-card scale-in"
            style={{ 
              background: "rgba(255,255,255,0.08)",
              backdropFilter: "blur(10px)",
              border: "2px solid rgba(255,255,255,0.15)",
              borderRadius: 18, 
              padding: 24, 
              cursor: "pointer",
              boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
              transition: "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)"
            }}
            onMouseEnter={(e) => {
              e.currentTarget.style.borderColor = "rgba(100,200,255,0.5)";
              e.currentTarget.style.boxShadow = "0 8px 30px rgba(100,200,255,0.2)";
            }}
            onMouseLeave={(e) => {
              e.currentTarget.style.borderColor = "rgba(255,255,255,0.15)";
              e.currentTarget.style.boxShadow = "0 4px 20px rgba(0,0,0,0.2)";
            }}
          >
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <Logo size={36} chip />
            </div>
            <div style={{ 
              fontSize: 17, 
              fontWeight: 700, 
              color: "#fff",
              marginBottom: 10
            }}>
              {charts[id].label}
            </div>
            <div style={{ 
              fontSize: 14, 
              color: "rgba(255,255,255,0.75)", 
              marginTop: 10, 
              lineHeight: 1.7 
            }}>
              {charts[id].short}
            </div>
            <div style={{ 
              fontSize: 13, 
              color: "#64c8ff", 
              marginTop: 16, 
              fontWeight: 600,
              display: "flex",
              alignItems: "center",
              gap: 8
            }}>
              Click to open chart →
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ===== Main App ===== */
function App() {
  const [view, setView] = useState("home");
  const [expandedNodes, setExpandedNodes] = useState(new Set());

  const toggleNode = useCallback((nodeId) => {
    setExpandedNodes(prev => {
      const newSet = new Set(prev);
      if (newSet.has(nodeId)) {
        newSet.delete(nodeId);
      } else {
        newSet.add(nodeId);
      }
      return newSet;
    });
  }, []);

  const handleExpandChart = useCallback((chartId) => {
    setView(chartId);
  }, []);

  const handleBack = useCallback(() => {
    setView("home");
  }, []);

  return (
    <div style={{ minHeight: "100vh" }}>
      {view === "home"
        ? <Home onExpandChart={handleExpandChart} />
        : <ChartPage 
            id={view} 
            onBack={handleBack} 
            onExpandChart={handleExpandChart}
            expandedNodes={expandedNodes}
            toggleNode={toggleNode}
          />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
