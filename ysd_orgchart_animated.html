/* ORG (above) is the built-in BACKUP copy of the data. The live data normally comes

/* ===== Assign ids + build lookup maps from a node tree ===== */
function buildTree(root) {
  const byId = {};
  const people = [];
  const cabinetIds = [];
  function visit(node, id, depth) {
    node._id = id; node._depth = depth;
    // inline any { group:true } children into a flat child list
    const flat = [];
    (node.children || []).forEach((k) => {
      if (k.group) (k.children || []).forEach((g) => flat.push(g));
      else flat.push(k);
    });
    node.children = flat;
    byId[id] = node;
    if (node.name) people.push({ name: node.name, title: node.title || "", sub: node.sub || "", id });
    if (node.person) people.push({ name: node.person, title: node.label || "", sub: "", id });
    if (node.cabinet) cabinetIds.push(id);
    flat.forEach((c, i) => visit(c, id + "-" + i, depth + 1));
  }
  visit(root, "0", 0);
  return { root, byId, people, cabinetIds };
}

function csvEndpoint(u) {
  u = (u || "").trim();
  if (!u) return "";
  if (/output=csv/.test(u) || /tqx=out:csv/.test(u) || /\.csv($|\?)/i.test(u)) return u; // already a CSV link
  const m = u.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  const id = m ? m[1] : u;                                              // accept a bare sheet id too
  return "https://docs.google.com/spreadsheets/d/" + id + "/gviz/tq?tqx=out:csv";
}

/* minimal RFC-4180 CSV parser -> array of string arrays */
function parseCSV(text) {
  const rows = []; let row = [], field = "", inQ = false;
  text = String(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += c;
    } else if (c === '"') inQ = true;
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
    else field += c;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

/* CSV text -> array of record objects keyed by our column names */
function csvToRecords(text) {
  const grid = parseCSV(text).filter((r) => r.some((c) => (c || "").trim() !== ""));
  if (grid.length < 2) return [];
  const head = grid[0].map((h) => h.trim().toLowerCase());
  const ix = (name) => head.indexOf(name);
  const col = { id: ix("id"), parent: ix("reports to"), type: ix("type"), name: ix("name"),
    title: ix("title"), detail: ix("detail"), phone: ix("phone"), email: ix("email"),
    cabinet: ix("cabinet"), lead: ix("lead"), an: ix("assistant name"), at: ix("assistant title"),
    ap: ix("assistant phone"), ae: ix("assistant email"), order: ix("order") };
  const g = (r, c) => (c >= 0 && c < r.length ? (r[c] || "").trim() : "");
  const recs = [];
  for (let i = 1; i < grid.length; i++) {
    const r = grid[i];
    recs.push({ rowNum: i + 1, id: g(r, col.id), parent: g(r, col.parent),
      type: (g(r, col.type) || "Person"), name: g(r, col.name), title: g(r, col.title),
      detail: g(r, col.detail), phone: g(r, col.phone), email: g(r, col.email),
      cabinet: /^(y|yes|true|x)$/i.test(g(r, col.cabinet)), lead: g(r, col.lead),
      an: g(r, col.an), at: g(r, col.at), ap: g(r, col.ap), ae: g(r, col.ae), order: g(r, col.order) });
  }
  return recs;
}

/* records -> a node tree (same shape as ORG) + any human-readable problems found */
function recordsToTree(recs) {
  const errors = [], byKey = {}, nodes = [];
  recs.forEach((rec) => {
    if (!rec.id) { errors.push("Row " + rec.rowNum + ": missing ID — row skipped."); return; }
    if (byKey[rec.id]) { errors.push("Row " + rec.rowNum + ': duplicate ID "' + rec.id + '" — row skipped.'); return; }
    const t = rec.type.toLowerCase();
    const node = { _key: rec.id, _parentKey: rec.parent, _order: rec.order, children: [] };
    if (t === "department") { node.dept = true; node.label = rec.name; if (rec.lead) node.person = rec.lead; }
    else if (t === "school") { node.schools = true; node.label = rec.name; }
    else if (t === "program") { node.programs = true; node.label = rec.name; }
    else if (t === "board") { node.board = true; node.name = rec.name; node.title = rec.title; }
    else { node.name = rec.name; node.title = rec.title; if (rec.detail) node.sub = rec.detail;
      if (rec.phone) node.phone = rec.phone; if (rec.email) node.email = rec.email;
      if (rec.an) node.assistant = { name: rec.an, title: rec.at, phone: rec.ap, email: rec.ae }; }
    if (rec.cabinet) node.cabinet = true;
    byKey[rec.id] = node; nodes.push(node);
  });
  const roots = [];
  nodes.forEach((n) => {
    if (!n._parentKey) { roots.push(n); return; }
    const p = byKey[n._parentKey];
    if (!p) { errors.push('Row "' + n._key + '": Reports To "' + n._parentKey + '" was not found — shown at the top.'); roots.push(n); return; }
    p.children.push(n);
  });
  const num = (v) => { const n = Number(v); return (v === "" || isNaN(n)) ? Infinity : n; };
  const sortKids = (n) => {
    n.children.sort((a, b) => { const x = num(a._order), y = num(b._order);
      if (x === y) return 0; if (x === Infinity) return 1; if (y === Infinity) return -1; return x - y; });
    n.children.forEach(sortKids);
  };
  if (!roots.length) return { root: null, errors: ['No top row found — exactly one row should have a blank "Reports To".'] };
  if (roots.length > 1) errors.push("Found " + roots.length + ' top-level rows (expected one). Showing "' + roots[0]._key + '" as the top.');
  const root = roots[0];
  sortKids(root);
  return { root, errors };
}

/* ===== School / Program lists (vertical, one row per name) =====
   A school's logo is looked up at logos/<slug>.png where <slug> is the name

   If the file isn't there, a 🏫 glyph is shown instead. Programs have no logo —
   just a bullet — since a Program row is a named initiative, not a building. */
function schoolSlug(name) { return String(name).toLowerCase().replace(/[^a-z0-9]+/g, ""); }
function splitList(label) { return String(label || "").split(/\s*[·;|]\s*/).map((s) => s.trim()).filter(Boolean); }

function SchoolRow({ name }) {

        {!err
          ? <img src={"logos/" + schoolSlug(name) + ".png"} alt="" onError={() => setErr(true)}
              style={{ width: "100%", height: "100%", objectFit: "contain", display: "block" }} />

      </div>
      <span style={{ fontSize: 12, fontWeight: 600, color: "#d9f3bf", textAlign: "left" }}>{name}</span>
    </div>
  );
}

/* ===== Node card ===== */

  } else if (node._depth === 1) {
    bg = "linear-gradient(135deg,#fcf05b 0%,#f4e23f 100%)"; border = "3px solid rgba(255,255,255,0.35)"; color = "#053c53"; titleColor = "rgba(5,60,83,0.85)";
  } else if (node.schools) {

  } else if (node.programs) {

  } else if (node.dept) {

  } else {

    boxShadow: goldEdge ? "0 0 20px rgba(252,240,91,0.5)"

      : node._depth === 1 ? "0 8px 32px rgba(252,240,91,0.32)"
      : isBoard ? "0 8px 28px rgba(0,0,0,0.35)" : "0 4px 16px rgba(0,0,0,0.22)",

          background: "linear-gradient(135deg,#fcf05b,#f4e23f)", color: "#053c53", fontSize: 9, fontWeight: 800,
          padding: "2px 9px", borderRadius: 10, whiteSpace: "nowrap", boxShadow: "0 2px 6px rgba(0,0,0,0.35)", letterSpacing: 0.4 }}>

      {node.name && <div style={{ fontSize: isBoard || node._depth === 1 ? 16 : 14, fontWeight: 700, marginBottom: 3 }}>{node.name}</div>}
      {node.schools && node.label && (

        </div>

      {node.programs && node.label && (

      {node.title && <div style={{ fontSize: 12, fontWeight: 600, color: titleColor }}>{node.title}</div>}

      {node.phone && <div style={{ fontSize: 11, color: darkText ? "rgba(5,60,83,0.74)" : "rgba(255,255,255,0.75)", marginTop: 4 }}>{node.phone}</div>}

          {isExpanded ? "▲ Expanded" : "▼ " + node.children.length + " report" + (node.children.length > 1 ? "s" : "")}
        </div>

/* ===== Recursive tree ===== */
function TreeNode({ node, expanded, closing, activeId, cabinetMode, hitId, onToggle, registerRef, index = 0 }) {
  const id = node._id;
  const hasChildren = node.children && node.children.length > 0;
  const isExpanded = expanded.has(id);
  const isClosing = closing && closing.has(id);
  const isCabinet = !!node.cabinet;
  // Cabinet highlight covers the cabinet members AND the Superintendent (the depth-1 node).
  const isHighlighted = isCabinet || node._depth === 1;

  // Only the Cabinet-highlight feature dims nodes now; the active-path lighting was removed.
  const dim = cabinetMode && !isHighlighted;

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ position: "relative", margin: node.assistant ? "0 150px" : 0,
        animationDelay: (Math.min(index, 8) * 0.04) + "s" }} className="grow-in">
        {node.assistant && <Assistant a={node.assistant} dim={dim} />}
        <NodeCard
          node={node} dim={dim} isExpanded={isExpanded} hasChildren={hasChildren}
          isCabinet={isCabinet} highlight={cabinetMode && isHighlighted} isHit={hitId === id}
          nodeRef={(el) => registerRef(id, el)}
          onClick={() => hasChildren && onToggle(id)}
        />
      </div>

      {hasChildren && isExpanded && (
        <div className={isClosing ? "subtree-collapse" : undefined} style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
          <VLine lit={false} />
          <div style={{ display: "flex", alignItems: "flex-start" }}>
            {node.children.map((c, idx) => {
              const n = node.children.length;
              const first = idx === 0, last = idx === n - 1, single = n === 1;
              const busOn = false;
              const busBg = busOn ? "rgba(0,155,182,0.6)" : "rgba(149,195,209,0.4)";
              const busSh = busOn ? "0 0 6px rgba(0,155,182,0.5)" : "none";
              return (
                <div key={c._id} style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", padding: "0 14px" }}>
                  {!single && (
                    <React.Fragment>
                      <div style={{ position: "absolute", top: 0, left: 0, width: "50%", height: 2, background: first ? "transparent" : busBg, boxShadow: first ? "none" : busSh, transition: "background .35s ease, box-shadow .35s ease" }} />
                      <div style={{ position: "absolute", top: 0, right: 0, width: "50%", height: 2, background: last ? "transparent" : busBg, boxShadow: last ? "none" : busSh, transition: "background .35s ease, box-shadow .35s ease" }} />
                    </React.Fragment>
                  )}
                  <VLine lit={busOn} />
                  <TreeNode node={c} index={idx} expanded={expanded} closing={closing} activeId={activeId} cabinetMode={cabinetMode}
                    hitId={hitId} onToggle={onToggle} registerRef={registerRef} />
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ===== Cabinet connector overlay (dashed gold links across the tree) ===== */
function CabinetLinks({ refs, canvasEl, cabinetIds, hubId, version }) {
  const [segs, setSegs] = useState([]);
  useLayoutEffect(() => {
    if (!canvasEl) return;
    const c = canvasEl.getBoundingClientRect();
    const scale = c.width / canvasEl.offsetWidth || 1;
    const measure = (id) => {
      const el = refs.current[id];
      if (!el || !el.isConnected) return null; // skip collapsed/unmounted members
      const r = el.getBoundingClientRect();
      return {
        x: (r.left + r.width / 2 - c.left) / scale, y: (r.top + r.height / 2 - c.top) / scale,
        hw: (r.width / 2) / scale, hh: (r.height / 2) / scale,
      };
    };
    // pull a segment endpoint back from a box's center to where it crosses the box's edge
    const toEdge = (from, toward) => {
      const dx = toward.x - from.x, dy = toward.y - from.y;
      if (!dx && !dy) return { x: from.x, y: from.y };
      const t = Math.min(dx ? from.hw / Math.abs(dx) : Infinity, dy ? from.hh / Math.abs(dy) : Infinity);
      return { x: from.x + dx * t, y: from.y + dy * t };
    };
    const clip = (a, b) => [toEdge(a, b), toEdge(b, a)];
    const hub = hubId ? measure(hubId) : null;
    const s = [];
    if (hub) {
      // spoke from the Superintendent out to each visible cabinet member
      cabinetIds.forEach((id) => { if (id === hubId) return; const p = measure(id); if (p) s.push(clip(hub, p)); });
    } else {
      const pts = cabinetIds.map(measure).filter(Boolean);
      for (let i = 0; i < pts.length - 1; i++) s.push(clip(pts[i], pts[i + 1]));
    }
    setSegs(s);
  }, [version, canvasEl, cabinetIds, hubId]);

  if (!segs.length) return null;
  return (
    <svg style={{ position: "absolute", left: 0, top: 0, width: "100%", height: "100%", pointerEvents: "none", overflow: "visible", zIndex: -1 }}>
      {segs.map(([a, b], i) => (
        <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#fcf05b" strokeWidth="1.5"
          strokeDasharray="7 5" opacity="0.35" style={{ animation: "dash 1.4s linear infinite" }} />
      ))}
    </svg>
  );
}

/* ===== Minimap ===== */
function Minimap({ viewportRef, canvasRef, refs, nodesById, tx, ty, scale, layoutVersion, onJump }) {
  const W = 200, H = 150, PAD = 8;
  // geometry + node silhouette, recomputed only when the tree structure changes
  const [geo, setGeo] = useState(null);
  useLayoutEffect(() => {
    const cv = canvasRef.current;
    if (!cv) return;
    const cw = cv.offsetWidth, ch = cv.offsetHeight;
    if (!cw || !ch) return;
    const cRect = cv.getBoundingClientRect();
    const liveScale = (cRect.width / cw) || 1; // actual on-screen scale (may differ mid-animation)
    // node boxes normalized to content coordinates (transform-invariant)
    const boxes = [];
    Object.keys(refs.current).forEach((id) => {
      const el = refs.current[id];
      if (!el || !el.isConnected) return;
      const r = el.getBoundingClientRect();
      boxes.push({
        x: (r.left - cRect.left) / liveScale, y: (r.top - cRect.top) / liveScale,
        w: r.width / liveScale, h: r.height / liveScale,
        cab: !!(nodesById[id] && nodesById[id].cabinet),
      });
    });
    const s = Math.min((W - PAD * 2) / cw, (H - PAD * 2) / ch);
    setGeo({ s, cw, ch, ox: (W - cw * s) / 2, oy: (H - ch * s) / 2, boxes });
  }, [layoutVersion]);

  // viewport indicator from current transform (cheap, every render)
  let ind = null;
  if (geo) {
    const vp = viewportRef.current;
    const vw = vp ? vp.clientWidth : 0, vh = vp ? vp.clientHeight : 0;
    ind = { x: geo.ox + (-tx / scale) * geo.s, y: geo.oy + (-ty / scale) * geo.s,
            w: (vw / scale) * geo.s, h: (vh / scale) * geo.s };
  }

  const handle = (e) => {
    if (!geo) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const mx = e.clientX - rect.left - geo.ox, my = e.clientY - rect.top - geo.oy;
    onJump(mx / geo.s, my / geo.s); // content coords to center on
  };

  return (
    <div onClick={handle} style={{ position: "absolute", left: 18, bottom: 18, width: W, height: H,
      background: "rgba(15,20,40,0.8)", border: "1.5px solid rgba(255,255,255,0.18)", borderRadius: 10,
      backdropFilter: "blur(8px)", cursor: "pointer", overflow: "hidden", boxShadow: "0 6px 20px rgba(0,0,0,0.35)" }}>
      <div style={{ position: "absolute", left: 8, top: 6, fontSize: 9, letterSpacing: 1, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", zIndex: 2 }}>Map</div>
      {geo && geo.boxes.map((b, i) => (
        <div key={i} style={{ position: "absolute",
          left: geo.ox + b.x * geo.s, top: geo.oy + b.y * geo.s,
          width: Math.max(2, b.w * geo.s), height: Math.max(2, b.h * geo.s),
          background: b.cab ? "rgba(252,240,91,0.95)" : "rgba(149,195,209,0.6)",
          borderRadius: 1.5 }} />
      ))}
      {ind && (
        <div style={{ position: "absolute", left: ind.x, top: ind.y, width: ind.w, height: ind.h,
          border: "1.5px solid #009bb6", background: "rgba(0,155,182,0.16)", borderRadius: 2,
          boxShadow: "0 0 8px rgba(0,155,182,0.5)", pointerEvents: "none" }} />
      )}
    </div>
  );
}

/* ===== Main App ===== */
function App() {
  const [expanded, setExpanded] = useState(() => new Set(["0", "0-0"])); // Board + Superintendent open
  const [closing, setClosing] = useState(() => new Set());                // branches currently animating shut
  const [activeId, setActiveId] = useState("0-0");
  const [cabinetMode, setCabinetMode] = useState(false);
  const [search, setSearch] = useState("");
  const [hitId, setHitId] = useState(null);
  const [layoutVersion, setLayoutVersion] = useState(0);

  // data loaded from the Google Sheet (or the embedded backup)
  const [data, setData] = useState(null);          // { root, byId, people, cabinetIds }
  const [status, setStatus] = useState("loading"); // loading | live | backup
  const [notice, setNotice] = useState("");        // shown when the live sheet can't be reached
  const [issues, setIssues] = useState([]);        // validation messages about specific rows

  // pan/zoom transform
  const [tx, setTx] = useState(0), [ty, setTy] = useState(60), [scale, setScale] = useState(1);
  const [animate, setAnimate] = useState(false);
  const [scrollHint, setScrollHint] = useState(false); // brief "Ctrl+scroll to zoom" nudge
  const [isFs, setIsFs] = useState(false);             // full-screen state

  const viewportRef = useRef(null);
  const canvasRef = useRef(null);
  const nodeRefs = useRef({});
  const recenterTo = useRef("0-0"); // center the Superintendent on first paint
  const drag = useRef(null);
  const hintTimer = useRef(null);
  const rootRef = useRef(null);
  const expandedRef = useRef(expanded);
  expandedRef.current = expanded; // always-current snapshot for the toggle handler

  const registerRef = useCallback((id, el) => { if (el) nodeRefs.current[id] = el; }, []);

  const results = (data && search.trim().length > 1)
    ? data.people.filter((p) => (p.name + " " + p.title + " " + p.sub).toLowerCase().includes(search.toLowerCase())).slice(0, 8)
    : [];

  /* load the org data once on startup: live Google Sheet, falling back to the embedded copy */
  useEffect(() => {
    let cancelled = false;
    const applied = (built, st, noticeMsg, errs) => {
      if (cancelled) return;
      setData(built); setStatus(st); setNotice(noticeMsg || ""); setIssues(errs || []);
      recenterTo.current = "0-0"; setLayoutVersion((v) => v + 1);
    };
    const useBackup = (noticeMsg) => applied(buildTree(ORG), "backup", noticeMsg, []);
    const url = csvEndpoint(SHEET_URL);
    if (!url) { useBackup(""); return; }
    fetch(url + (url.indexOf("?") >= 0 ? "&" : "?") + "_cb=" + Date.now())
      .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then((text) => {
        const parsed = recordsToTree(csvToRecords(text));
        if (!parsed.root) throw new Error("no root row");
        applied(buildTree(parsed.root), "live", "", parsed.errors);
      })
      .catch(() => useBackup('Couldn’t reach the live Google Sheet, so this is the saved backup copy. (Make sure the sheet is shared as “Anyone with the link: Viewer”.)'));
    return () => { cancelled = true; };
  }, []);

  /* expand/collapse a node */
  const CLOSE_MS = 450; // keep in sync with .subtree-collapse duration
  const onToggle = useCallback((id) => {
    if (expandedRef.current.has(id)) {
      // animated collapse: play the shrink/fade, then actually remove the subtree
      const parent = id.includes("-") ? id.slice(0, id.lastIndexOf("-")) : id;
      setClosing((c) => { const n = new Set(c); n.add(id); return n; });
      setActiveId(parent);
      setTimeout(() => {
        setExpanded((p) => {
          const next = new Set(p);
          Array.from(next).forEach((k) => { if (isAncestorOrSelf(id, k)) next.delete(k); });
          return next;
        });
        setClosing((c) => { const n = new Set(c); n.delete(id); return n; });
        recenterTo.current = parent;
        setLayoutVersion((v) => v + 1);
      }, CLOSE_MS);
    } else {
      setExpanded((p) => { const next = new Set(p); next.add(id); return next; });
      setActiveId(id);
      recenterTo.current = id;
      setLayoutVersion((v) => v + 1);
    }
  }, []);

  /* search -> open path + recenter + pulse */
  const goToPerson = useCallback((id) => {
    setExpanded((prev) => {
      const next = new Set(prev);
      ancestorsOf(id).forEach((a) => next.add(a));
      next.add(id);
      return next;
    });
    setActiveId(id);
    setCabinetMode(false);
    setSearch("");
    recenterTo.current = id;
    setHitId(id);
    setLayoutVersion((v) => v + 1);
    setTimeout(() => setHitId(null), 2800);
  }, []);

  const collapseAll = useCallback(() => {
    setExpanded(new Set(["0", "0-0"]));
    setActiveId("0-0");
    recenterTo.current = "0-0";
    setLayoutVersion((v) => v + 1);
  }, []);

  /* Highlight Cabinet: when turning on, expand every branch needed so all cabinet
     members are visible, then recenter on the Superintendent. */
  const toggleCabinet = useCallback(() => {
    const turningOn = !cabinetMode;
    if (turningOn && data) {
      setExpanded((prev) => {
        const e = new Set(prev);
        data.cabinetIds.forEach((cid) => ancestorsOf(cid).forEach((a) => e.add(a)));
        return e;
      });
      recenterTo.current = "0-0"; // the Superintendent
    }
    setCabinetMode(turningOn);
    setLayoutVersion((v) => v + 1);
  }, [cabinetMode, data]);

  /* full-screen toggle (works inside the iframe because the embed has allowfullscreen) */
  const toggleFullscreen = useCallback(() => {
    const el = rootRef.current;
    if (!el) return;
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (!fsEl) {
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) req.call(el);
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) exit.call(document);
    }
  }, []);
  useEffect(() => {
    const onFs = () => setIsFs(!!(document.fullscreenElement || document.webkitFullscreenElement));
    document.addEventListener("fullscreenchange", onFs);
    document.addEventListener("webkitfullscreenchange", onFs);
    return () => {
      document.removeEventListener("fullscreenchange", onFs);
      document.removeEventListener("webkitfullscreenchange", onFs);
    };
  }, []);

  /* recenter after layout changes */
  useLayoutEffect(() => {
    const id = recenterTo.current;
    if (!id) return;
    recenterTo.current = null;
    const el = nodeRefs.current[id], vp = viewportRef.current;
    if (!el || !vp) return;
    const r = el.getBoundingClientRect(), v = vp.getBoundingClientRect();
    const targetX = v.left + v.width / 2, targetY = v.top + v.height * 0.32;
    setAnimate(true);
    setTx((t) => t + (targetX - (r.left + r.width / 2)));
    setTy((t) => t + (targetY - (r.top + r.height / 2)));
  }, [layoutVersion]);

  /* pan */
  const onPointerDown = (e) => {
    if (e.target.closest(".node-card")) return; // let cards handle clicks
    drag.current = { x: e.clientX, y: e.clientY, tx, ty, moved: false };
    setAnimate(false);
  };
  const onPointerMove = (e) => {
    if (!drag.current) return;
    const dx = e.clientX - drag.current.x, dy = e.clientY - drag.current.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) drag.current.moved = true;
    setTx(drag.current.tx + dx); setTy(drag.current.ty + dy);
  };
  const onPointerUp = () => { drag.current = null; };

  /* zoom toward cursor — attached as a NON-passive native wheel listener so preventDefault()
     actually blocks the browser's Ctrl/Cmd + scroll page-zoom (React's onWheel is passive,
     so preventDefault there is ignored and the whole page would zoom too). */
  useEffect(() => {
    const vp = viewportRef.current;
    if (!vp) return;
    const onWheel = (e) => {
      // Embedded-friendly: a plain scroll passes through to the host page.
      if (!e.ctrlKey && !e.metaKey) {
        setScrollHint(true);
        clearTimeout(hintTimer.current);
        hintTimer.current = setTimeout(() => setScrollHint(false), 1300);
        return; // do NOT preventDefault -> the page scrolls normally
      }
      e.preventDefault(); // blocks the browser's page-zoom; we zoom only the chart
      const rect = vp.getBoundingClientRect();
      const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      setAnimate(false);
      setScale((s) => {
        const ns = Math.min(2.2, Math.max(0.25, s * factor));
        const k = ns / s;
        setTx((t) => cx - (cx - t) * k);
        setTy((t) => cy - (cy - t) * k);
        return ns;
      });
    };
    vp.addEventListener("wheel", onWheel, { passive: false });
    return () => vp.removeEventListener("wheel", onWheel);
  }, [data]);

  const zoomBy = (factor) => {
    const vp = viewportRef.current.getBoundingClientRect();
    const cx = vp.width / 2, cy = vp.height / 2;
    setAnimate(true);
    setScale((s) => {
      const ns = Math.min(2.2, Math.max(0.25, s * factor));
      const k = ns / s;
      setTx((t) => cx - (cx - t) * k);
      setTy((t) => cy - (cy - t) * k);
      return ns;
    });
  };

  const minimapJump = (contentX, contentY) => {
    const vp = viewportRef.current;
    setAnimate(true);
    setTx(vp.clientWidth / 2 - contentX * scale);
    setTy(vp.clientHeight / 2 - contentY * scale);
  };

  if (!data) {
    return (
      <div style={{ width: "100vw", height: "100vh", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", gap: 16 }}>
        <Logo size={72} />
        <div style={{ fontSize: 16, color: "rgba(255,255,255,0.8)" }}>Loading organizational chart…</div>
      </div>
    );
  }

  return (
    <div ref={rootRef} style={{ width: "100vw", height: "100vh", position: "relative",
      background: "linear-gradient(135deg, #053c53 0%, #042b3b 100%)" }}>
      {/* Toolbar */}
      <div style={{ position: "absolute", top: 14, left: 14, right: 14, zIndex: 20, display: "flex", alignItems: "center",
        gap: 14, flexWrap: "wrap", padding: "12px 18px", background: "rgba(255,255,255,0.08)", backdropFilter: "blur(15px)",
        borderRadius: 16, border: "1.5px solid rgba(255,255,255,0.12)", boxShadow: "0 8px 30px rgba(0,0,0,0.3)" }}>
        <Logo size={40} chip />
        <div style={{ marginRight: "auto" }}>
          <div style={{ fontSize: 19, fontWeight: 700, color: "#fff", lineHeight: 1.1 }}>Yakima School District</div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.65)" }}>One organization · click a card to expand it · Ctrl + scroll or +/− to zoom</div>
        </div>

        <div style={{ position: "relative" }}>
          <input type="text" value={search} onChange={(e) => setSearch(e.target.value)}
            placeholder="🔍 Search people…"
            style={{ width: 230, fontSize: 14, padding: "10px 14px", borderRadius: 10, outline: "none",
              border: "1.5px solid rgba(255,255,255,0.2)", background: "rgba(255,255,255,0.1)", color: "#fff" }} />
          {results.length > 0 && (
            <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: "rgba(20,25,48,0.97)",
              backdropFilter: "blur(12px)", borderRadius: 10, border: "1.5px solid rgba(255,255,255,0.18)", overflow: "hidden",
              boxShadow: "0 12px 30px rgba(0,0,0,0.45)", zIndex: 30 }}>
              {results.map((p) => (
                <div key={p.id} onClick={() => goToPerson(p.id)}
                  style={{ padding: "9px 13px", cursor: "pointer", fontSize: 13, color: "#fff", borderBottom: "1px solid rgba(255,255,255,0.07)" }}
                  onMouseEnter={(e) => e.currentTarget.style.background = "rgba(149,195,209,0.18)"}
                  onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
                  <b>{p.name}</b>{p.title ? <span style={{ color: "rgba(255,255,255,0.65)" }}> — {p.title}</span> : ""}
                </div>
              ))}
            </div>
          )}
        </div>

        <button className={"tool-btn btn-gold" + (cabinetMode ? " on" : "")} onClick={toggleCabinet}>
          ★ {cabinetMode ? "Cabinet shown" : "Highlight Cabinet"}
        </button>
        <button className="tool-btn btn-red" onClick={collapseAll}>↑ Collapse All</button>

        <div title={status === "live" ? "Loaded live from your Google Sheet" : "Showing the built-in backup copy"}
          style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600,
            color: status === "live" ? "#abd374" : "#fcf05b" }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: "currentColor", boxShadow: "0 0 8px currentColor" }} />
          {status === "live" ? "Live data" : "Backup data"}
        </div>

        {(notice || issues.length > 0) && (
          <div style={{ flexBasis: "100%", marginTop: 2, padding: "10px 14px", borderRadius: 10,
            background: "rgba(252,240,91,0.14)", border: "1px solid rgba(252,240,91,0.45)",
            color: "#ffe6a6", fontSize: 12.5, lineHeight: 1.55 }}>
            {notice && <div style={{ fontWeight: 700, marginBottom: issues.length ? 5 : 0 }}>⚠ {notice}</div>}
            {issues.slice(0, 6).map((m, i) => <div key={i}>• {m}</div>)}
            {issues.length > 6 && <div>• …and {issues.length - 6} more.</div>}
          </div>
        )}
      </div>

      {/* Viewport */}
      <div ref={viewportRef} onPointerDown={onPointerDown} onPointerMove={onPointerMove}
        onPointerUp={onPointerUp} onPointerLeave={onPointerUp}
        style={{ position: "absolute", inset: 0, overflow: "hidden", cursor: drag.current ? "grabbing" : "grab", touchAction: "none" }}>
        <div ref={canvasRef} style={{ position: "absolute", left: 0, top: 0, transformOrigin: "0 0",
          transform: `translate(${tx}px, ${ty}px) scale(${scale})`,
          transition: animate ? "transform 0.65s cubic-bezier(0.65, 0, 0.35, 1)" : "none",
          padding: "120px 80px 80px", width: "max-content" }}>
          {cabinetMode && <CabinetLinks refs={nodeRefs} canvasEl={canvasRef.current} cabinetIds={data.cabinetIds} hubId="0-0" version={layoutVersion + "-" + tx + "-" + scale} />}
          <TreeNode node={data.root} expanded={expanded} closing={closing} activeId={activeId} cabinetMode={cabinetMode}
            hitId={hitId} onToggle={onToggle} registerRef={registerRef} />
        </div>
      </div>

      {/* Zoom + view controls */}
      <div style={{ position: "absolute", right: 18, bottom: 18, zIndex: 20, display: "flex", flexDirection: "column", gap: 8 }}>
        <button className="zoom-btn" title={isFs ? "Exit full screen" : "Full screen"} onClick={toggleFullscreen}>{isFs ? "🡴" : "⛶"}</button>
        <button className="zoom-btn" title="Zoom in (or Ctrl + scroll)" onClick={() => zoomBy(1.2)}>+</button>
        <button className="zoom-btn" title="Zoom out (or Ctrl + scroll)" onClick={() => zoomBy(1 / 1.2)}>−</button>
        <button className="zoom-btn" title="Reset zoom to 100%" style={{ fontSize: 12, fontWeight: 700 }} onClick={() => { setAnimate(true); setScale(1); recenterTo.current = activeId; setLayoutVersion((v) => v + 1); }}>1:1</button>
      </div>

      {/* Transient nudge when someone scrolls over the chart without the zoom modifier */}
      {scrollHint && (
        <div style={{ position: "absolute", left: "50%", bottom: 26, transform: "translateX(-50%)", zIndex: 30,
          background: "rgba(15,20,40,0.92)", color: "#fff", fontSize: 13, fontWeight: 600,
          padding: "9px 16px", borderRadius: 20, border: "1.5px solid rgba(255,255,255,0.2)",
          boxShadow: "0 6px 20px rgba(0,0,0,0.4)", pointerEvents: "none", animation: "fadeIn 0.15s ease-out" }}>
          Hold <b>Ctrl</b> + scroll to zoom, or use the + / − buttons
        </div>
      )}

      <Minimap viewportRef={viewportRef} canvasRef={canvasRef} refs={nodeRefs} nodesById={data.byId} tx={tx} ty={ty} scale={scale}
        layoutVersion={layoutVersion} onJump={minimapJump} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
